        /* --- RESET & GLOBAL VARIABLES --- */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4CAF50; /* Hijau Aksen */
            --primary-hover: #45a049;
            --accent-color: #ff9800;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --card-bg: #252525;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-jp: 'Noto Sans JP', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow-x: hidden; /* Mencegah scroll ke kiri/kanan */
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-weight: 700; }
        .jp-text { font-family: var(--font-jp); }
        
        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LAYOUT CONTAINERS --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
            text-align: center;
        }

        #main-app {
            display: none; /* Hidden initially */
            flex-direction: column;
            min-height: 100vh;
            max-width: 600px; /* Mobile view constraint on desktop */
            margin: 0 auto;
            background-color: var(--bg-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- WELCOME SCREEN COMPONENTS --- */
        .welcome-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .welcome-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.98); }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .btn-secondary {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-accent {
            background-color: #25D366; /* WA Color */
            color: white;
        }

        /* --- MAIN APP HEADER --- */
        header {
            padding: 1rem;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-brand {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-brand span { color: var(--primary-color); }

        /* --- SEARCH BAR --- */
        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            padding-left: 40px;
            background-color: #2c2c2c;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus { border-color: var(--primary-color); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* --- CATEGORY PILLS (UPDATED LAYOUT) --- */
        /* Mengubah dari scroll horizontal menjadi Grid (Wrap) */
        .category-nav {
            display: flex;
            flex-wrap: wrap; /* Tombol akan turun ke bawah jika tidak muat */
            gap: 8px;
            padding: 12px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            justify-content: flex-start; /* Rata kiri */
        }

        .cat-pill {
            padding: 8px 16px;
            background-color: var(--surface-color);
            border-radius: 20px;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s;
            flex: 0 0 auto; /* Agar tombol tidak melebar terlalu banyak */
        }

        .cat-pill.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        /* --- VOCABULARY LIST --- */
        .vocab-list {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 80px; /* Space for footer */
        }

        .vocab-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: transform 0.1s;
        }
        
        .vocab-card:active {
            transform: scale(0.99);
        }

        .vocab-main {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .vocab-kanji {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1.3;
        }

        .vocab-hiragana {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .vocab-romaji {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 4px;
        }

        .vocab-meaning {
            font-size: 1rem;
            color: #e0e0e0;
            border-top: 1px solid #333;
            padding-top: 8px;
            margin-top: 4px;
            line-height: 1.4;
        }
        
        .vocab-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #333;
            color: #aaa;
            align-self: flex-start;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* --- FOOTER --- */
        footer {
            padding: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            background-color: var(--bg-color);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 600px) {
            #main-app {
                border: none;
                max-width: 100%;
            }
            .category-nav {
                justify-content: center; /* Di HP rata tengah biar rapi */
            }
            .welcome-title { font-size: 1.8rem; }
        }

        // --- STATE MANAGEMENT ---
        let currentCategory = 'Semua';
        let searchQuery = '';

        // --- DOM ELEMENTS ---
        const welcomeScreen = document.getElementById('welcome-screen');
        const mainApp = document.getElementById('main-app');
        const searchInput = document.getElementById('searchInput');
        const vocabListContainer = document.getElementById('vocabList');
        const categoryContainer = document.getElementById('categoryContainer');
        const catButtons = document.querySelectorAll('.cat-pill');

        // --- FUNCTIONS ---

        // 1. Transisi Masuk ke Aplikasi
        function enterApp() {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.classList.add('hidden');
                mainApp.style.display = 'flex';
                mainApp.classList.add('fade-in');
                renderVocabList(); // Render awal
            }, 400);
        }

        // 2. Render List Kosakata
        function renderVocabList() {
            vocabListContainer.innerHTML = '';
            
            // Filter Data
            const filteredData = rawVocabulary.filter(item => {
                const matchCategory = currentCategory === 'Semua' || item.c === currentCategory;
                const queryLower = searchQuery.toLowerCase();
                const matchSearch = 
                    item.k.toLowerCase().includes(queryLower) || // Kanji/Jp
                    item.h.toLowerCase().includes(queryLower) || // Hiragana
                    item.r.toLowerCase().includes(queryLower) || // Romaji
                    item.i.toLowerCase().includes(queryLower);   // Indo
                
                return matchCategory && matchSearch;
            });

            // Tampilkan Hasil atau Empty State
            if (filteredData.length === 0) {
                vocabListContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Tidak ditemukan</h3>
                        <p>Coba kata kunci atau kategori lain.</p>
                    </div>
                `;
                return;
            }

            // Generate Cards
            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.innerHTML = `
                    <div class="vocab-main">
                        <div>
                            <span class="vocab-kanji jp-text">${item.k}</span>
                            <div class="vocab-hiragana jp-text">${item.h}</div>
                        </div>
                    </div>
                    <div class="vocab-romaji">${item.r}</div>
                    <div class="vocab-meaning">${item.i}</div>
                    <div class="vocab-tag">${item.c}</div>
                `;
                vocabListContainer.appendChild(card);
            });
        }

        // 3. Filter Kategori
        function filterCategory(category) {
            currentCategory = category;
            
            // Update UI Tombol
            catButtons.forEach(btn => {
                if(btn.innerText === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            renderVocabList();
        }

        // 4. Event Listener Pencarian (Live Search)
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderVocabList();
        });
